<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MakReader</title>
<link rel="icon" type="image/png" href="/icon">
<link rel="apple-touch-icon" href="/icon">
<style>
  :root{--bg:#0e1014;--panel:#171a21;--panel2:#1f232c;--border:#2a2f3a;--text:#e7e9ee;
    --muted:#9aa3b2;--accent:#7c5cff;--accent2:#5a8dee;--good:#3ec27a;--warn:#e0a13a;--reader-bg:#0a0a0a;}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  button{font-family:inherit;cursor:pointer}.hidden{display:none !important}
  header{position:sticky;top:0;z-index:50;background:rgba(14,16,20,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .bar{display:flex;align-items:center;gap:10px;padding:12px 16px;max-width:1100px;margin:0 auto;flex-wrap:wrap}
  .logoimg{width:30px;height:30px;border-radius:7px;flex:none}
  .logo{font-weight:800;font-size:20px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
  .tabs{display:flex;gap:4px;flex:1}
  .tab{background:none;border:none;color:var(--muted);padding:8px 13px;border-radius:9px;font-size:14px;font-weight:600}
  .tab.active{background:var(--panel2);color:var(--text)}
  .tab .badge{display:inline-block;min-width:18px;padding:0 5px;margin-left:6px;font-size:11px;line-height:18px;text-align:center;background:var(--accent);color:#fff;border-radius:9px}
  .search{display:flex;gap:8px;align-items:center}
  select,.search input{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:10px;font-size:14px;outline:none}
  .search input{width:200px}.search input:focus{border-color:var(--accent)}
  main{max-width:1100px;margin:0 auto;padding:18px 16px 70px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .12s,border-color .12s;position:relative}
  .card:hover{transform:translateY(-3px);border-color:var(--accent)}
  .card .cover{width:100%;aspect-ratio:11/16;object-fit:cover;background:var(--panel2);display:block}
  .card .meta{padding:8px 10px}
  .card .t{font-size:13px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .s{font-size:11px;color:var(--muted);margin-top:4px}
  .srcpill{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px}
  .rmbtn{position:absolute;top:6px;right:6px;z-index:3;background:rgba(0,0,0,.7);color:#fff;border:none;width:24px;height:24px;border-radius:50%;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s}
  .card:hover .rmbtn{opacity:1}
  .rmbtn:hover{background:#c0392b}
  .libhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:4px 0 12px}
  .moremenu{position:relative;display:inline-block}
  .moremenu>summary{list-style:none}.moremenu>summary::-webkit-details-marker{display:none}
  .morepop{position:absolute;z-index:40;top:calc(100% + 6px);left:0;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:6px;min-width:210px;box-shadow:0 10px 34px rgba(0,0,0,.55)}
  .morepop .btn{width:100%;text-align:left}
  .unread{position:absolute;top:8px;right:8px;background:var(--good);color:#06231a;font-size:11px;font-weight:800;padding:2px 7px;border-radius:9px}
  .inlib{position:absolute;top:8px;right:8px;z-index:2;background:var(--good);color:#06231a;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .dlpill{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px}
  .card.sel{outline:3px solid var(--accent);outline-offset:-3px}
  .selbox{position:absolute;bottom:8px;left:8px;z-index:3;width:24px;height:24px;border-radius:50%;border:2px solid #fff;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
  .card.sel .selbox{background:var(--accent);border-color:var(--accent)}
  .grid.compact{grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:11px}
  .grid.compact .card .t{font-size:12px}
  .bulkbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:14px}
  .bulkbar .cnt{font-weight:700;margin-right:4px}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
  .chip{background:var(--panel);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .chap .dot{width:9px;height:9px;border-radius:50%;background:var(--accent2);flex:none}
  .chap.st-cur{border-color:#1fa9e0}.chap.st-new{border-color:#e8514a}
  .cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:10px}
  .ctile{height:54px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer;background:#3f444e;color:#e7e9ee;padding:0 6px;text-align:center;line-height:1.1;overflow:hidden;transition:transform .1s}
  .ctile:hover{transform:translateY(-2px)}
  .ctile.read{background:#23262e;color:#cfd3da}
  .ctile.cur{background:#1fa9e0;color:#fff}
  .ctile.new{background:#e8514a;color:#fff}
  .ctile.dl{box-shadow:inset 0 -4px 0 var(--good)}
  .chap .cdl{background:var(--panel2);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:4px 9px;font-size:12px}
  .chap .cdl.done{color:var(--good);border-color:var(--good)}
  .card.update::after{content:"NEW";position:absolute;top:8px;right:8px;background:var(--good);color:#06231a;font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px}
  .empty{color:var(--muted);text-align:center;padding:60px 20px;font-size:15px;line-height:1.6}.empty b{color:var(--text)}
  h3.sec{font-size:15px;margin:4px 0 12px}
  /* detail */
  .hero{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
  .hero .bg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:blur(30px) brightness(.32);transform:scale(1.2)}
  .hero .detail-head{position:relative;padding:22px}
  .heroShare{position:absolute;top:12px;right:12px;z-index:5;background:rgba(0,0,0,.55);border:1px solid var(--border);color:#fff;width:38px;height:38px;border-radius:10px;font-size:17px;cursor:pointer}
  .heroShare:hover{background:var(--accent);border-color:var(--accent)}
  .libstate{background:var(--good);color:#06231a;border:none;padding:10px 14px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer}
  .detail-head{display:flex;gap:20px;flex-wrap:wrap}
  .detail-head .cover{width:210px;aspect-ratio:11/16;object-fit:cover;border-radius:12px;border:1px solid var(--border);background:var(--panel2);box-shadow:0 8px 30px rgba(0,0,0,.5)}
  .alttitles{color:var(--muted);font-size:12.5px;margin:0 0 8px;line-height:1.5;font-style:italic}
  .desc.clamp{max-height:130px;overflow:hidden;-webkit-mask-image:linear-gradient(#000 65%,transparent);mask-image:linear-gradient(#000 65%,transparent)}
  .descmore{background:none;border:none;color:var(--accent2);font-size:13px;font-weight:700;padding:8px 0;cursor:pointer}
  .malbox{border:0.5px solid var(--border);border-radius:12px;margin-top:18px;background:var(--panel)}
  .malbox>summary{cursor:pointer;padding:12px 16px;font-weight:600;font-size:14px;list-style:none;display:flex;align-items:center;gap:8px}
  .malbox>summary::-webkit-details-marker{display:none}
  .malbox>summary::before{content:"▸";color:var(--muted)}
  .malbox[open]>summary::before{content:"▾"}
  .malc{padding:0 16px 16px}
  .malh{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent2);margin:14px 0 6px;font-weight:700}
  .malrow{font-size:13px;color:#c7ccd6;line-height:1.7}.malrow b{color:var(--muted);font-weight:600}
  .malsyn{font-size:13px;color:#c7ccd6;line-height:1.7;max-height:240px;overflow:auto;white-space:normal}
  .detail-info{flex:1;min-width:260px}.detail-info h1{margin:0 0 6px;font-size:24px}
  .detail-info .alt{color:var(--muted);font-size:13px;margin-bottom:12px}
  .tagrow{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 2px}
  .tag{background:var(--panel2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 9px;border-radius:20px}
  .metaline{color:#c7ccd6;font-size:13px;margin:2px 0 4px}.metaline b{color:var(--muted);font-weight:600}
  .desc{color:#c7ccd6;font-size:14px;line-height:1.6;margin:12px 0;max-height:170px;overflow:auto}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .btn{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:700;font-size:14px}
  .btn.sec{background:var(--panel2);color:var(--text);border:1px solid var(--border)}.btn.on{background:var(--good);color:#06231a}
  .chapters{margin-top:24px}.chapters h3{font-size:15px;margin:0 0 10px}
  .chap{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--panel);cursor:pointer}
  .chap:hover{background:var(--panel2)}.chap.read{opacity:.55}
  .chap .num{font-weight:700;font-size:14px;min-width:90px}.chap .ti{flex:1;font-size:13px;color:#c7ccd6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* sources tab */
  .srcrow{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;background:var(--panel)}
  .srcrow .info{flex:1}.srcrow .nm{font-weight:700;font-size:15px}.srcrow .nt{font-size:12px;color:var(--muted);margin-top:3px}
  .srcrow.off{opacity:.5}
  .arrows{display:flex;flex-direction:column;gap:2px}
  .arrows button{background:var(--panel2);border:1px solid var(--border);color:var(--text);width:30px;height:22px;border-radius:6px;font-size:11px;line-height:1}
  .switch{position:relative;width:46px;height:26px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:var(--panel2);border:1px solid var(--border);border-radius:26px;transition:.2s}
  .slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:var(--muted);border-radius:50%;transition:.2s}
  .switch input:checked+.slider{background:var(--good);border-color:var(--good)}
  .switch input:checked+.slider:before{transform:translateX(20px);background:#06231a}
  /* reader */
  #reader{position:fixed;inset:0;background:var(--reader-bg);z-index:100;overflow-y:auto;display:none}
  #reader.light{background:#e9e6df}
  .rtop{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(10,10,10,.85);backdrop-filter:blur(8px);border-bottom:1px solid #222}
  #reader.light .rtop{background:rgba(233,230,223,.9);border-color:#cbc8c0;color:#222}
  .rtop .rtitle{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ricon{background:var(--panel2);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:9px;font-size:16px}
  #quitTop{flex:none}#quitTop:hover{background:#c0392b;border-color:#c0392b;color:#fff}
  #reader.light .ricon{background:#fff;border-color:#cbc8c0;color:#222}
  .pages{display:flex;flex-direction:column;align-items:center;padding-bottom:80px}
  .pages img{max-width:760px;width:100%;display:block}
  .pages.paged{height:calc(100vh - 60px);justify-content:center;padding:0}
  .pages.paged img{max-height:calc(100vh - 80px);width:auto;max-width:100%;object-fit:contain;display:none}
  .pages.paged img.cur{display:block}
  .rnav{position:fixed;bottom:0;left:0;right:0;display:flex;gap:10px;justify-content:center;align-items:center;padding:12px;background:rgba(10,10,10,.85);backdrop-filter:blur(8px);border-top:1px solid #222}
  #reader.light .rnav{background:rgba(233,230,223,.9);border-color:#cbc8c0}
  .rnav .pgi{font-size:13px;color:var(--muted);min-width:80px;text-align:center}
  .loading{text-align:center;color:var(--muted);padding:50px}
  .spin{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .errbox{background:rgba(224,161,58,.12);border:1px solid var(--warn);color:#f0d4a0;padding:14px;border-radius:10px;font-size:14px;line-height:1.5}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--border);padding:10px 18px;border-radius:10px;z-index:200;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:80%}
  .toast.show{opacity:1}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal .box{background:var(--panel);border:1px solid var(--border);border-radius:14px;max-width:520px;width:100%;padding:22px;max-height:86vh;overflow:auto}
  .modal h2{margin:0 0 4px;font-size:19px}.modal p.sub{color:var(--muted);font-size:13px;margin:0 0 16px}
  .modal label.ck{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--border);border-radius:9px;margin-bottom:7px;font-size:14px;cursor:pointer}
  .modal label.ck input{width:17px;height:17px}.modal label.ck .ct{margin-left:auto;color:var(--muted);font-size:12px}
  .modal .fld{margin:14px 0 6px;font-size:13px;color:var(--muted)}
  .impprog{font-size:14px;line-height:1.6;margin-top:8px}
  .impbar{height:8px;background:var(--panel2);border-radius:6px;overflow:hidden;margin:10px 0}
  .impbar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .2s}
  .modal .row{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
</style>
</head>
<body>
<header>
  <div class="bar">
    <img src="/icon" class="logoimg" alt="" onerror="this.style.display='none'">
    <div class="logo">MakReader</div>
    <div class="tabs">
      <button class="tab active" data-tab="library">Libreria <span class="badge hidden" id="updBadge">0</span></button>
      <button class="tab" data-tab="search">Cerca</button>
      <button class="tab" data-tab="suggestions">Suggerimenti <span class="badge hidden" id="sugBadge">0</span></button>
      <button class="tab" data-tab="sources">Sorgenti</button>
    </div>
    <div class="search">
      <select id="searchBy" title="Cerca per"><option value="title">Titolo</option><option value="author">Autore</option></select>
      <select id="srcSel" title="Sorgente di ricerca"></select>
      <input id="searchInput" type="search" placeholder="Cerca manga…" autocomplete="off">
    </div>
    <button class="ricon" id="quitTop" title="Chiudi MakReader">⏻</button>
  </div>
</header>

<main>
  <div id="view-library"></div>
  <div id="view-search" class="hidden"></div>
  <div id="view-suggestions" class="hidden"></div>
  <div id="view-sources" class="hidden"></div>
  <div id="view-detail" class="hidden"></div>
</main>

<div id="reader">
  <div class="rtop">
    <button class="ricon" id="rClose">✕</button>
    <div class="rtitle" id="rTitle"></div>
    <select id="rChap" title="Vai al capitolo" style="max-width:150px"></select>
    <button class="ricon" id="rDl" title="Scarica capitolo">⬇</button>
    <button class="ricon" id="rWidth" title="Larghezza pagina">↔</button>
    <button class="ricon" id="rDir" title="Direzione (sinistra/destra)">⇄</button>
    <button class="ricon" id="rMode" title="Scroll / Pagina">⇅</button>
    <button class="ricon" id="rLight" title="Giorno / Notte">◐</button>
  </div>
  <div class="pages" id="rPages"></div>
  <div class="rnav">
    <button class="btn sec" id="rPrev">‹ Prec</button>
    <span class="pgi" id="rPgi"></span>
    <button class="btn sec" id="rNext">Succ ›</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="malFile" accept=".xml,.gz,.xml.gz,application/gzip,text/xml" class="hidden">
<input type="file" id="backupFile" accept="application/json,.json" class="hidden">
<input type="file" id="sugFile" accept=".mkr,text/plain" class="hidden">
<div id="importModal" class="modal hidden"><div class="box" id="importBox"></div></div>

<script>
const $=s=>document.querySelector(s);
let DB={follows:{},progress:{},history:[],sources:{order:[],enabled:{}},settings:{},suggestions:[]};
let sugFilter="__all__";
let SET={dir:"ltr",width:"M",autoHours:6,notify:false};
let META=[];               // [{id,name,note,lang,base}]
let curSearchSource=localStorage.getItem("searchSource")||"__all__";
let searchBy=localStorage.getItem("searchBy")||"title";
let searchGroup=localStorage.getItem("searchGroup")!=="0";
let recentSearches=JSON.parse(localStorage.getItem("recentSearches")||"[]");
let libFilter=localStorage.getItem("libFilter")||"__all__";
let libSort=localStorage.getItem("libSort")||"recent";
let libGroup=localStorage.getItem("libGroup")==="1";
let libDensity=localStorage.getItem("libDensity")||"normal";
let libQuery="";
let libGenres=JSON.parse(localStorage.getItem("libGenres")||"[]");  // generi MAL selezionati (logica AND)
let genreOpen=false, genreQuery="";  // stato tendina generi (apertura + ricerca interna)
let libSelect=false, selSet=new Set(), dlCount={};
let chapView=localStorage.getItem("chapView")||"grid";
let curDetail=null, detailBack="library";
function persistLib(){localStorage.setItem("libFilter",libFilter);localStorage.setItem("libSort",libSort);localStorage.setItem("libGroup",libGroup?"1":"0");localStorage.setItem("libDensity",libDensity);localStorage.setItem("libGenres",JSON.stringify(libGenres));}
let reader={chapters:[],idx:0,pages:[],page:0,paged:false,key:null,source:null,title:"",cover:"",ref:""};

const key=(src,id)=>src+"||"+id;
const img=(u,ref)=>"/img?url="+encodeURIComponent(u)+(ref?"&ref="+encodeURIComponent(ref):"");
const metaOf=id=>META.find(m=>m.id===id)||{name:id};
const srcRef=src=>(metaOf(src).base||'')+'/';   // Referer corretto per le immagini = sito sorgente
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600);}
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
async function jget(u){const r=await fetch(u);const d=await r.json();if(d&&d.error)throw new Error(d.error);return d;}
let dataLoaded=false;
async function saveDB(){if(!dataLoaded)return;await fetch("/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(DB)});}

// ---------- tabs ----------
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>showTab(t.dataset.tab));
function showTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===name));
  ["library","search","suggestions","sources","detail"].forEach(v=>$("#view-"+v).classList.toggle("hidden",v!==name));
  if(name==="library")renderLibrary();
  if(name==="suggestions")renderSuggestions();
  if(name==="sources")renderSources();
}

// ---------- sources ----------
function enabledSources(){return DB.sources.order.filter(id=>DB.sources.enabled[id]);}
function fillSourceSelect(){
  const sel=$("#srcSel");const en=enabledSources();
  sel.innerHTML='<option value="__all__">Tutte le sorgenti</option>'+en.map(id=>`<option value="${id}">${esc(metaOf(id).name)}</option>`).join("");
  if(curSearchSource!=="__all__"&&!en.includes(curSearchSource))curSearchSource=en[0]||"__all__";
  sel.value=curSearchSource;
}
$("#srcSel").onchange=e=>{curSearchSource=e.target.value;localStorage.setItem("searchSource",curSearchSource);const q=$("#searchInput").value.trim();if(q)doSearch(q);};
$("#searchBy").value=searchBy;
$("#searchBy").onchange=e=>{searchBy=e.target.value;localStorage.setItem("searchBy",searchBy);$("#searchInput").placeholder=searchBy==="author"?"Cerca autore…":"Cerca manga…";const q=$("#searchInput").value.trim();if(q)doSearch(q);};

function renderSources(){
  const v=$("#view-sources");
  v.innerHTML='<h3 class="sec">Sorgenti — attiva, disattiva e riordina (l\'ordine vale per ricerca e priorità)</h3>'+
    DB.sources.order.map((id,i)=>{
      const m=metaOf(id),on=DB.sources.enabled[id];
      return `<div class="srcrow ${on?'':'off'}">

async function applyUpd(){

async function move(id,d){const o=DB.sources.order,i=o.indexOf(id),j=i+d;if(j<0||j>=o.length)return;[o[i],o[j]]=[o[j],o[i]];await saveSources();renderSources();}
async function saveSources(){fillSourceSelect();await fetch("/sources",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(DB.sources)});}

// ---------- search ----------
let stimer;
$("#searchInput").addEventListener("input",e=>{clearTimeout(stimer);const q=e.target.value.trim();if(q)stimer=setTimeout(()=>doSearch(q),400);});
$("#searchInput").addEventListener("focus",()=>{showTab("search");if(!$("#searchInput").value.trim())renderSearchHome();});
function renderSearchHome(){
  const v=$("#view-search");
  v.innerHTML=recentSearches.length?('<h3 class="sec">Ricerche recenti</h3>'+recentChipsHtml()):'<div class="empty">Scrivi un titolo per cercare.<br>Sorgente: <b>'+esc(curSearchSource==="__all__"?"Tutte le sorgenti":metaOf(curSearchSource).name)+'</b></div>';
  bindRecentChips(v);
}
function addRecent(q){q=(q||"").trim();if(!q)return;recentSearches=[q,...recentSearches.filter(x=>x.toLowerCase()!==q.toLowerCase())].slice(0,8);localStorage.setItem("recentSearches",JSON.stringify(recentSearches));}
function recentChipsHtml(){return recentSearches.length?('<div class="chips" style="margin-bottom:14px">'+recentSearches.map(q=>'<span class="chip" data-rq="'+esc(q)+'">'+esc(q)+'</span>').join("")+'<span class="chip" data-rclear="1">pulisci</span></div>'):"";}
function bindRecentChips(v){
  v.querySelectorAll("[data-rq]").forEach(c=>c.onclick=()=>{$("#searchInput").value=c.dataset.rq;doSearch(c.dataset.rq);});
  const cc=v.querySelector("[data-rclear]");if(cc)cc.onclick=()=>{recentSearches=[];localStorage.removeItem("recentSearches");const q=$("#searchInput").value.trim();q?doSearch(q):renderSearchHome();};
}
function inLib(src,id){return !!DB.follows[key(src,id)];}
function cardHtml(src,m){
  return `<div class="card" data-src="${esc(src)}" data-id="${esc(m.id)}">
    <span class="srcpill">${esc(metaOf(src).name)}</span>
    ${inLib(src,m.id)?'<span class="inlib" title="In libreria">✓</span>':''}
    ${m.cover?`<img class="cover" src="${img(m.cover,srcRef(src))}" loading="lazy" onerror="this.style.visibility='hidden'">`:'<div class="cover"></div>'}
    <div class="meta"><div class="t">${esc(m.title)}</div><div class="s">${esc(m.status||"")}</div></div></div>`;
}
function bindSearchCards(c){c.querySelectorAll(".card").forEach(el=>{if(el._b)return;el._b=1;el.onclick=()=>openDetail(el.dataset.src,el.dataset.id);});}
async function doSearch(q){
  showTab("search");
  addRecent(q);
  const v=$("#view-search"), en=enabledSources();
  if(!en.length){v.innerHTML='<div class="empty">Nessuna sorgente attiva. Vai su <b>Sorgenti</b>.</div>';return;}
  if(curSearchSource==="__all__")return multiSearch(q,en);
  v.innerHTML=recentChipsHtml()+'<h3 class="sec">'+esc(metaOf(curSearchSource).name)+': '+esc(q)+'</h3><div class="loading"><div class="spin"></div></div>';
  bindRecentChips(v);
  try{
    const d=await jget(`/search?source=${encodeURIComponent(curSearchSource)}&q=${encodeURIComponent(q)}&by=${searchBy}`);
    const lo=v.querySelector(".loading");if(lo)lo.remove();
    if(!d.results.length){
      v.insertAdjacentHTML("beforeend",'<div class="empty">Nessun risultato su '+esc(metaOf(curSearchSource).name)+'.<br><button class="btn" id="extAll" style="margin-top:14px">Estendi a tutte le sorgenti</button></div>');
      $("#extAll").onclick=()=>multiSearch(q,en);return;
    }
    const grid=document.createElement("div");grid.className="grid";
    grid.innerHTML=d.results.map(m=>cardHtml(curSearchSource,m)).join("");
    v.appendChild(grid);bindSearchCards(grid);
  }catch(e){
    const lo=v.querySelector(".loading");
    const msg='<div class="errbox">Errore dalla sorgente: '+esc(e.message)+'. <button class="btn" id="extAll" style="margin-top:8px">Estendi a tutte</button></div>';
    if(lo)lo.outerHTML=msg;else v.insertAdjacentHTML("beforeend",msg);
    const ea=$("#extAll");if(ea)ea.onclick=()=>multiSearch(q,en);
  }
}
async function multiSearch(q,en){
  const v=$("#view-search");
  v.innerHTML=recentChipsHtml()+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><h3 class="sec" style="margin:0">Tutte le sorgenti: '+esc(q)+'</h3>'+
    '<button class="btn sec" id="grpBtn" style="margin-left:auto;padding:6px 12px">'+(searchGroup?"Raggruppate":"Mescolate")+'</button></div><div id="msArea"></div>';
  bindRecentChips(v);
  $("#grpBtn").onclick=()=>{searchGroup=!searchGroup;localStorage.setItem("searchGroup",searchGroup?"1":"0");multiSearch(q,en);};
  const area=$("#msArea");
  if(searchGroup){
    for(const s of en){
      const sec=document.createElement("div");sec.innerHTML='<div class="fld">'+esc(metaOf(s).name)+' …</div>';area.appendChild(sec);
      try{const d=await jget(`/search?source=${encodeURIComponent(s)}&q=${encodeURIComponent(q)}&by=${searchBy}`);
        const rs=d.results||[];
        if(rs.length){sec.innerHTML='<div class="fld">'+esc(metaOf(s).name)+' ('+rs.length+')</div>';
          const g=document.createElement("div");g.className="grid";g.style.marginBottom="20px";g.innerHTML=rs.map(m=>cardHtml(s,m)).join("");sec.appendChild(g);bindSearchCards(g);}
        else sec.innerHTML='<div class="fld">'+esc(metaOf(s).name)+' — nessun risultato</div>';
      }catch(e){sec.innerHTML='<div class="fld">'+esc(metaOf(s).name)+' — errore</div>';}
    }
  }else{
    const status=document.createElement("div");status.className="fld";status.textContent="Cerco…";area.appendChild(status);
    const grid=document.createElement("div");grid.className="grid";area.appendChild(grid);
    let done=0;
    await Promise.all(en.map(async s=>{
      try{const d=await jget(`/search?source=${encodeURIComponent(s)}&q=${encodeURIComponent(q)}&by=${searchBy}`);
        const frag=(d.results||[]).map(m=>cardHtml(s,m)).join("");
        if(frag){grid.insertAdjacentHTML("beforeend",frag);bindSearchCards(grid);}
      }catch(e){}
      done++;status.textContent=done<en.length?("Cerco… ("+done+"/"+en.length+")"):(grid.children.length?"":"Nessun risultato.");
    }));
  }
}

const CATS=["Reading","Plan to Read","Completed","On-Hold","Dropped"];

async function openDetail(src,id,known){

  const crossBtn=enabledSources().filter(s=>s!==src).length?('<button class="btn sec" id="crossBtn">🔎 Altre sorgenti</button>'):'';
  const malUrl=(f&&f.malId)?('https://myanimelist.net/manga/'+encodeURIComponent(f.malId)):('https://myanimelist.net/manga.php?cat=manga&q='+encodeURIComponent(d.title||(known&&known.title)||""));
  const metaBits=[d.status,d.year,d.author].filter(Boolean).map(esc).join(" · ");
  // generi: preferisci quelli di MAL (se il manga è già arricchito); altrimenti

  const heroBg=cover?('<div class="bg" style="background-image:url(\''+img(cover,refHost)+'\')"></div>'):'';
  const altHtml=(d.altTitles&&d.altTitles.length)?('<div class="alttitles">'+esc(d.altTitles.slice(0,5).join("  ·  "))+'</div>'):'';
  const descText=(esc(d.description||"").replace(/\n/g,"<br>"))||'<span style="color:var(--muted)">Nessuna trama disponibile da questa sorgente.</span>';
  v.innerHTML=`
   <button class="btn sec" id="backBtn" style="margin-bottom:14px">← Indietro</button>
   <div class="hero">${heroBg}
     <button class="heroShare" id="shareBtn" title="Consiglia a un amico">↗</button>
   <div class="detail-head">
     ${cover?`<img class="cover" src="${img(cover,refHost)}" onerror="this.style.visibility='hidden'">`:'<div class="cover"></div>'}
     <div class="detail-info">
       <h1>${esc(d.title||(known&&known.title)||"")}</h1>
       ${altHtml}
       <div class="alt">Sorgente: ${esc(metaOf(src).name)} · ${d.chapters.length} capitoli</div>
       ${metaBits?`<div class="metaline">${metaBits}</div>`:''}
       ${genresHtml}
       <div class="actions">
         <span id="libCtrlWrap"></span>
         ${resumeBtn}
         <button class="btn sec" id="readFirst">Leggi dall'inizio</button>
         <button class="btn sec" id="dlAll">⬇ Scarica tutti</button>
         ${crossBtn}
         <button class="btn sec" id="malBtn">MAL ↗</button>
       </div>
     </div>
   </div>
   </div>
   <details class="malbox" id="malBox"><summary>Info da MyAnimeList</summary><div class="malc" id="malContent"></div></details>
   <div style="margin-top:20px"><h3 style="font-size:15px;margin:0 0 8px">Trama</h3>
     <div class="desc clamp" id="descBox">${descText}</div>

  const db=$("#descBox"),dmore=$("#descMore");
  if(db.scrollHeight>db.clientHeight+8){dmore.classList.remove("hidden");dmore.onclick=()=>{const open=db.classList.toggle("clamp");dmore.textContent=open?"Mostra tutto ▾":"Mostra meno ▴";};}
  const cl=$("#chapList");
  const malRead=f&&f.malRead?parseFloat(f.malRead):0;
  const readSet=new Set((prog&&prog.readChapters)||[]);
  const baseIdx=(f&&f.lastChapterId)?d.chapters.findIndex(c=>c.id===f.lastChapterId):-1;
  const curId=prog&&prog.lastChapterId;
  function chState(c,i){
    if(curId&&c.id===curId)return "cur";
    if(baseIdx>=0&&i>baseIdx)return "new";
    if(readSet.has(c.id)||(malRead&&c.number&&parseFloat(c.number||0)<=malRead))return "read";

function myName(){return (SET&&SET.name)||"";}
function setSugBadge(){const b=$("#sugBadge");const n=(DB.suggestions||[]).length;if(n>0){b.textContent=n;b.classList.remove("hidden");}else b.classList.add("hidden");}
function encodeShare(items){
  const payload={t:"mkr-share",from:myName(),items:items.map(x=>({s:x.source,i:x.id,ti:x.title||"",c:x.cover||"",m:x.msg||""}))};
  return "MKR1:"+btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
}
function decodeShare(text){
  text=(text||"").trim();const i=text.indexOf("MKR1:");
  if(i<0)throw new Error("codice non riconosciuto");
  let json;try{json=decodeURIComponent(escape(atob(text.slice(i+5).trim())));}catch(e){throw new Error("codice illeggibile");}
  const p=JSON.parse(json);
  if(p.t!=="mkr-share"||!Array.isArray(p.items))throw new Error("codice non valido");
  return p;
}
function validItem(it){
  if(!it||!it.s||!it.i||!META.find(m=>m.id===it.s))return false;
  if(/^https?:\/\//i.test(it.i)){
    try{if(new URL(it.i).host!==new URL(metaOf(it.s).base).host)return false;}catch(e){return false;}
  }
  return true;
}
function importShare(text){
  let p;try{p=decodeShare(text);}catch(e){toast("Import fallito: "+e.message);return -1;}
  let added=0;
  p.items.forEach(it=>{
    if(!validItem(it))return;
    const s={source:it.s,id:it.i,title:it.ti||"",cover:it.c||"",msg:it.m||"",from:p.from||"",ts:Date.now()};
    if(!DB.suggestions.find(x=>x.source===s.source&&x.id===s.id&&x.from===s.from)){DB.suggestions.push(s);added++;}
  });
  saveDB();setSugBadge();
  return added;
}

function malContentHtml(m){
  let h="";
  const alt=[];
  if(m.english)alt.push(["English",m.english]);
  if(m.japanese)alt.push(["Japanese",m.japanese]);
  if(m.synonyms&&m.synonyms.length)alt.push(["Synonyms",m.synonyms.join(", ")]);
  if(alt.length)h+='<div class="malh">Alternative titles</div>'+alt.map(r=>'<div class="malrow"><b>'+esc(r[0])+':</b> '+esc(r[1])+'</div>').join("");
  if(m.info&&m.info.length)h+='<div class="malh">Information</div>'+m.info.map(r=>'<div class="malrow"><b>'+esc(r[0])+':</b> '+esc(r[1])+'</div>').join("");
  if(m.synopsis)h+='<div class="malh">Synopsis</div><div class="malsyn">'+esc(m.synopsis).replace(/\n/g,"<br>")+'</div>';
  if(m.url)h+='<div style="margin-top:12px"><a href="'+esc(m.url)+'" target="_blank" class="btn sec" style="padding:6px 12px;display:inline-block">Apri su MyAnimeList ↗</a></div>';
  return h||'<div class="malrow">Nessun dettaglio disponibile.</div>';
}
async function loadMal(id,title,k){
  const c=$("#malContent");if(!c)return;
  c.innerHTML='<div class="loading"><div class="spin"></div></div>';
  try{
    const u=id?("/mal?id="+encodeURIComponent(id)):("/mal?title="+encodeURIComponent(title));
    const d=await jget(u);
    c.innerHTML=d.found?malContentHtml(d.mal):'<div class="malrow">Nessun dato trovato su MyAnimeList per questo titolo.</div>';
    // arricchimento passivo: salva ID + generi MAL sul manga in libreria (una volta)
    if(d.found&&d.mal&&k&&DB.follows[k]){
      const f=DB.follows[k];let ch=false;
      if(d.mal.mal_id&&!f.malId){f.malId=String(d.mal.mal_id);ch=true;}
      if(d.mal.genres&&f.genres===undefined){f.genres=d.mal.genres;ch=true;}
      if(ch)saveDB();
      // aggiorna dal vivo la riga generi della scheda con quelli di MAL
      if(f.genres&&f.genres.length){const gr=$("#genreRow");if(gr)gr.innerHTML=f.genres.map(g=>'<span class="tag">'+esc(g)+'</span>').join("");}
    }
  }catch(e){c.innerHTML='<div class="malrow">Errore nel recupero da MAL: '+esc(e.message)+'</div>';}
  // correzione manuale dell'abbinamento (per i manga in libreria)
  if(k&&DB.follows[k]){
    const fb=document.createElement("div");fb.style.marginTop="10px";
    fb.innerHTML='<button class="btn sec" id="malFix" style="padding:5px 11px">Non è questo manga? Correggi</button>';
    c.appendChild(fb);
    const mf=$("#malFix");if(mf)mf.onclick=()=>fixMal(k,title);
  }
}
async function fixMal(k,title){
  const inp=prompt("Incolla il link alla pagina MANGA di MyAnimeList (…/manga/NUMERO/…) oppure il solo numero ID:","");
  if(inp===null)return;
  const s=String(inp).trim();if(!s)return;
  if(/myanimelist\.net\/anime\//i.test(s)){toast("È un link a un ANIME: serve il link alla pagina MANGA su MyAnimeList.");return;}
  let id=null;
  const m=s.match(/myanimelist\.net\/manga\/(\d+)/i);
  if(m)id=m[1];
  else if(/^\d{1,7}$/.test(s))id=s;  // solo un numero = ID del manga
  if(!id){toast("Link non valido. Incolla l'indirizzo della pagina MANGA su MyAnimeList, o il solo numero ID.");return;}
  // verifica che l'ID esista DAVVERO come manga, prima di salvarlo
  let d=null;try{d=await jget("/mal?id="+encodeURIComponent(id));}catch(e){}
  if(!d||!d.found){toast("Nessun manga trovato con quell'ID su MyAnimeList. Controlla che sia un link MANGA.");return;}
  const f=DB.follows[k];if(!f)return;
  f.malId=id;f.genres=undefined;   // azzero i generi: verranno ripresi dal nuovo ID
  await saveDB();
  await loadMal(id,title,k);       // ricarica il pannello col manga giusto e risalva
  toast("Collegamento MAL aggiornato ✓");
}
async function resumeReading(src,id){
  const k=key(src,id),prog=DB.progress[k];
  try{const d=await jget(`/details?source=${encodeURIComponent(src)}&url=${encodeURIComponent(id)}`);
    let idx=0;if(prog&&prog.lastChapterId){const j=d.chapters.findIndex(c=>c.id===prog.lastChapterId);if(j>=0)idx=j;}
    openReader(src,d.chapters,idx,k,d.title,d.cover||"",srcRef(src),prog?prog.lastPage||0:0);
  }catch(e){openDetail(src,id);}
}

    '<button class="btn sec" id="bkNone" style="padding:7px 12px">Nessuno</button></div>';
  const dens=libDensity==="compact"?" compact":"";
  const q=libQuery.trim().toLowerCase();
  let arr=ids.map(k=>({k,o:DB.follows[k],p:DB.progress[k]||{}}));
  if(q)arr=arr.filter(x=>(x.o.title||"").toLowerCase().includes(q));
  // filtro per generi MAL: tiene i manga che hanno TUTTI i generi selezionati (AND)
  if(libGenres.length)arr=arr.filter(x=>{const g=x.o.genres||[];return libGenres.every(s=>g.includes(s));});
  const sortFn=(a,b)=>libSort==="alpha"?(a.o.title||"").localeCompare(b.o.title||"")
    :libSort==="unread"?(effUnread(b.o)-effUnread(a.o))
    :libSort==="updated"?((parseFloat(b.o.latestNum)||0)-(parseFloat(a.o.latestNum)||0))
    :((b.p.lastReadAt||0)-(a.p.lastReadAt||0));
  if(libGroup){
    const order=["Reading","Plan to Read","Completed","On-Hold","Dropped"];
    const groups={};arr.forEach(x=>{const c=x.o.category||"Senza stato";(groups[c]=groups[c]||[]).push(x);});
    const gk=Object.keys(groups).sort((a,b)=>{const ia=order.indexOf(a),ib=order.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib)||a.localeCompare(b);});
    if(!arr.length)html+='<div class="empty">Nessun risultato.</div>';
    gk.forEach(c=>{const list=groups[c].slice().sort(sortFn);

  }else{
    const newCount=ids.filter(k=>effUnread(DB.follows[k])>0).length;
    const cats=[...new Set(ids.map(k=>DB.follows[k].category||""))];
    let chips='<span class="chip '+(libFilter==="__all__"?"on":"")+'" data-cat="__all__">Tutti</span>';
    if(newCount)chips+='<span class="chip '+(libFilter==="__new__"?"on":"")+'" data-cat="__new__">Novità ('+newCount+')</span>';
    chips+=cats.map(c=>'<span class="chip '+(libFilter===c?"on":"")+'" data-cat="'+esc(c)+'">'+(c||"Senza stato")+'</span>').join("");
    html+='<div class="chips">'+chips+'</div>';
    let farr=arr.slice();
    if(libFilter==="__new__")farr=farr.filter(x=>effUnread(x.o)>0);
    else if(libFilter!=="__all__")farr=farr.filter(x=>(x.o.category||"")===libFilter);
    farr.sort(sortFn);
    html+='<div class="grid'+dens+'">'+(farr.length?farr.map(x=>cardMini(x.o,{rm:true})).join(""):'<div class="empty">Nessun risultato.</div>')+'</div>';
  }
  v.innerHTML=html;
  if(libQuery){const e=$("#libSearch");if(e){e.focus();e.setSelectionRange(e.value.length,e.value.length);}}
  const ss=$("#sortSel");if(ss){ss.value=libSort;ss.onchange=()=>{libSort=ss.value;persistLib();renderLibrary();};}
  v.querySelectorAll("[data-cat]").forEach(c=>c.onclick=()=>{libFilter=c.dataset.cat;persistLib();renderLibrary();});
  const gDet=$("#genreDet");if(gDet)gDet.addEventListener("toggle",()=>{genreOpen=gDet.open;});
  const gSearch=$("#genreSearch");
  if(gSearch){
    gSearch.oninput=()=>{genreQuery=gSearch.value;const qq=genreQuery.toLowerCase();
      $("#genreList").querySelectorAll("label").forEach(l=>{const g=l.querySelector(".genrebox").value.toLowerCase();l.style.display=(!qq||g.includes(qq))?"flex":"none";});};
    if(genreOpen&&genreQuery){gSearch.focus();gSearch.setSelectionRange(gSearch.value.length,gSearch.value.length);}
  }
  v.querySelectorAll(".genrebox").forEach(cb=>cb.onchange=()=>{const g=cb.value;
    if(cb.checked){if(!libGenres.includes(g))libGenres.push(g);}else libGenres=libGenres.filter(x=>x!==g);
    genreOpen=true;persistLib();renderLibrary();});
  const gClear=$("#genreClear");if(gClear)gClear.onclick=()=>{libGenres=[];genreOpen=true;persistLib();renderLibrary();};
  const gScanM=$("#genreScanMenu");if(gScanM)gScanM.onclick=scanGenres;
  bindLib(v);
}
function bindLib(v){
  $("#importMal").onclick=()=>$("#malFile").click();

  $("#restoreBtn").onclick=()=>$("#backupFile").click();

  const db2=$("#densBtn");if(db2)db2.onclick=()=>{libDensity=libDensity==="compact"?"normal":"compact";persistLib();renderLibrary();};
  const sb=$("#selBtn");if(sb)sb.onclick=()=>{libSelect=!libSelect;if(!libSelect)selSet.clear();renderLibrary();};
  const lsr=$("#libSearch");if(lsr)lsr.oninput=()=>{libQuery=lsr.value;renderLibrary();};
  const cl=$("#clearLib");if(cl)cl.onclick=async()=>{if(confirm("Svuotare tutta la libreria? (cronologia e progressi restano)")){DB.follows={};await saveDB();renderLibrary();}};
  const bind=(id,fn)=>{const e=$("#"+id);if(e)e.onclick=fn;};
  bind("bkAll",()=>{Object.keys(DB.follows).forEach(k=>selSet.add(k));renderLibrary();});

  bind("bkRead",async()=>{selSet.forEach(k=>{if(DB.follows[k])DB.follows[k].unread=0;});await saveDB();renderLibrary();toast("Segnati in pari");});
  bind("bkShare",()=>{const items=[...selSet].map(k=>DB.follows[k]).filter(Boolean).map(o=>({source:o.source,id:o.id,title:o.title,cover:o.cover}));if(items.length)openShareModal(items);});
  bind("bkDl",async()=>{if(!selSet.size)return;if(confirm("Scaricare TUTTI i capitoli di "+selSet.size+" manga? Può essere molto pesante."))bulkDownload([...selSet]);});
  const bc=$("#bkCat");if(bc)bc.onchange=async()=>{selSet.forEach(k=>{if(DB.follows[k])DB.follows[k].category=bc.value;});await saveDB();renderLibrary();toast("Stato aggiornato");};
  v.querySelectorAll("[data-rm]").forEach(b=>b.onclick=async e=>{e.stopPropagation();delete DB.follows[b.dataset.rm];await saveDB();renderLibrary();});

function exportLibrary(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="makreader-libreria-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);toast("Backup esportato");
}
async function bulkDownload(keys){
  toast("Preparo i download…");let total=0;
  for(const k of keys){const f=DB.follows[k];if(!f)continue;
    try{const d=await jget(`/details?source=${encodeURIComponent(f.source)}&url=${encodeURIComponent(f.id)}`);
      if(d.chapters.length){await downloadChapters(d.chapters.map(c=>({source:f.source,chapter_id:c.id,manga_key:k,title:d.title,chapter_name:c.name||('Cap. '+c.number)})));total+=d.chapters.length;}
    }catch(e){}
  }
  toast(total+" capitoli messi in coda");
}
function cardMini(o,opts){
  opts=opts||{};
  const un=effUnread(o);
  const p=DB.progress[key(o.source,o.id)]||{};
  const read=p.lastChapterNum,avail=o.latestNum;
  let sline="";
  if(opts.resume)sline=o.chapterNum?("Cap. "+esc(o.chapterNum)):"";
  else if(read||avail)sline=(read?esc(read):"–")+" / "+(avail?esc(avail):"?");
  const mk=key(o.source,o.id),seld=selSet.has(mk),dln=dlCount[mk]||0;
  return `<div class="card${seld?' sel':''}" data-key="${esc(mk)}" data-src="${esc(o.source)}" data-id="${esc(o.id)}" ${opts.resume?'data-resume="1"':''}>
    <span class="srcpill">${esc(metaOf(o.source).name)}</span>
    ${(!opts.resume&&libSelect)?`<span class="selbox">${seld?'✓':''}</span>`:''}
    ${(!opts.resume&&dln>0)?`<span class="dlpill">⬇ ${dln}</span>`:''}
    ${opts.rm?`<button class="rmbtn" data-rm="${esc(key(o.source,o.id))}" title="Rimuovi dalla libreria">✕</button>`:''}
    ${(!opts.resume&&un>0)?`<span class="unread">${un}</span>`:''}
    ${o.cover?`<img class="cover" src="${img(o.cover,srcRef(o.source))}" loading="lazy" onerror="this.style.visibility='hidden'">`:'<div class="cover"></div>'}
    <div class="meta"><div class="t">${esc(o.title)||'<span style=\"color:var(--muted)\">(apri per il titolo)</span>'}</div>${sline?`<div class="s" title="letto / disponibile">${sline}</div>`:''}</div></div>`;
}

// ---------- updates ----------
async function renderUpdates(){
  const v=$("#view-updates");const ids=Object.keys(DB.follows);
  if(!ids.length){v.innerHTML='<div class="empty">Aggiungi manga alla libreria per controllare i nuovi capitoli.</div>';return;}
  v.innerHTML='<div class="loading"><div class="spin"></div> &nbsp;Controllo nuovi capitoli…</div>';
  const upd=[];
  for(const k of ids){const f=DB.follows[k];
    try{const d=await jget(`/details?source=${encodeURIComponent(f.source)}&url=${encodeURIComponent(f.id)}`);
      if(!d.chapters.length)continue;
      const latest=d.chapters[d.chapters.length-1];
      const nums=d.chapters.map(c=>parseFloat(c.number)).filter(n=>!isNaN(n));
      f.latestNum=nums.length?String(Math.max(...nums)):(latest.number||"");
      const idx=f.lastChapterId?d.chapters.findIndex(c=>c.id===f.lastChapterId):-1;
      const unread=(f.category==="Dropped")?0:(idx>=0?(d.chapters.length-1-idx):(f.lastChapterId?d.chapters.length:0));
      f.unread=unread;
      if(unread>0)upd.push({k,f,latest,unread});
    }catch(e){}
  }
  await saveDB();
  setBadge(Object.values(DB.follows).filter(f=>effUnread(f)>0).length);
  if(!upd.length){v.innerHTML='<h3 class="sec">Aggiornamenti</h3><div class="empty">Sei aggiornato! ✓</div>';return;}
  upd.sort((a,b)=>b.unread-a.unread);
  v.innerHTML='<h3 class="sec">Nuovi capitoli</h3><div class="grid">'+upd.map(u=>{
    const o=u.f;
    return `<div class="card update" data-src="${esc(o.source)}" data-id="${esc(o.id)}">
      <span class="srcpill">${esc(metaOf(o.source).name)}</span>
      <span class="unread">+${u.unread}</span>
      ${o.cover?`<img class="cover" src="${img(o.cover,srcRef(o.source))}" onerror="this.style.visibility='hidden'">`:'<div class="cover"></div>'}
      <div class="meta"><div class="t">${esc(o.title)}</div><div class="s">Nuovo: ${esc(u.latest.name||('Cap. '+u.latest.number))}</div></div></div>`;
  }).join("")+'</div>';
  v.querySelectorAll(".card").forEach(el=>el.onclick=()=>openDetail(el.dataset.src,el.dataset.id));
}
function setBadge(n){const b=$("#updBadge");if(n>0){b.textContent=n;b.classList.remove("hidden");}else b.classList.add("hidden");}

// ---------- reader ----------
const WIDTHS={S:560,M:760,L:1040};
async function openReader(src,chapters,idx,mangaKey,title,cover,ref,startPage){
  reader={chapters,idx,pages:[],page:0,paged:reader.paged,key:mangaKey,source:src,title,cover,ref:"",resume:startPage||0,offline:false};
  $("#reader").style.display="block";
  $("#rChap").innerHTML=chapters.map((c,i)=>`<option value="${i}">${esc(c.name||('Cap. '+c.number))}</option>`).join("");
  await loadChapter();
}
async function loadChapter(){
  const ch=reader.chapters[reader.idx];
  $("#rChap").value=reader.idx;
  $("#rTitle").textContent=reader.title+"  ·  "+(ch.name||("Cap. "+ch.number));
  const pg=$("#rPages");pg.innerHTML='<div class="loading"><div class="spin"></div></div>';$("#reader").scrollTop=0;
  try{
    const d=await jget(`/pages?source=${encodeURIComponent(reader.source)}&url=${encodeURIComponent(ch.id)}`);
    reader.ref=d.referer||"";reader.offline=!!d.offline;
    reader.pages=d.pages.map(u=>u.indexOf("/file?")===0?u:img(u,d.referer));
    reader.page=Math.min(reader.resume||0,Math.max(0,reader.pages.length-1));reader.resume=0;
    renderPages();updateDlBtn();markRead(ch);recordHistory(ch);
    if(!reader.paged&&reader.page>0)setTimeout(()=>scrollToPage(reader.page),60);
  }catch(e){
    pg.innerHTML=`<div class="errbox" style="margin:20px">Impossibile caricare le pagine da ${esc(metaOf(reader.source).name)}.<br><br>${esc(e.message)}<br><br>Suggerimento: prova lo stesso manga da un'altra sorgente (es. WeebCentral), oppure passa al capitolo successivo.</div>`;
  }
}
function renderPages(){
  const pg=$("#rPages");pg.className="pages"+(reader.paged?" paged":"");
  if(!reader.pages.length){pg.innerHTML='<div class="errbox" style="margin:20px">Nessuna pagina trovata.</div>';return;}
  const w=WIDTHS[SET.width]||760;
  pg.innerHTML=reader.pages.map((u,i)=>`<img src="${u}" loading="${reader.paged?'eager':'lazy'}" style="max-width:${w}px" class="${reader.paged&&i===reader.page?'cur':''}">`).join("");
  if(reader.paged)pg.onclick=e=>{const r=pg.getBoundingClientRect();const right=e.clientX>r.left+r.width/2;((SET.dir==='rtl')?!right:right)?nextPage():prevPage();};else pg.onclick=null;
  updatePgi();if(reader.paged)preload();
}
function preload(){const n=reader.page+1;if(n<reader.pages.length){const im=new Image();im.src=reader.pages[n];}}
function scrollToPage(i){const im=document.querySelectorAll("#rPages img")[i];if(im)$("#reader").scrollTop=im.offsetTop-50;}
function showPage(i){reader.page=Math.max(0,Math.min(reader.pages.length-1,i));document.querySelectorAll("#rPages img").forEach((im,k)=>im.classList.toggle("cur",k===reader.page));updatePgi();preload();saveProgress();}
function nextPage(){if(reader.paged){reader.page<reader.pages.length-1?showPage(reader.page+1):nextChapter();}}
function prevPage(){if(reader.paged){reader.page>0?showPage(reader.page-1):prevChapter();}}
function updatePgi(){$("#rPgi").textContent=reader.paged?`${reader.page+1} / ${reader.pages.length}`:`${reader.pages.length} pagine`;}
function nextChapter(){reader.idx<reader.chapters.length-1?(reader.idx++,loadChapter()):toast("Ultimo capitolo");}
function prevChapter(){reader.idx>0?(reader.idx--,loadChapter()):toast("Primo capitolo");}
let saveT;
function saveProgress(){clearTimeout(saveT);saveT=setTimeout(()=>{const k=reader.key;if(!k||!reader.chapters[reader.idx])return;const p=DB.progress[k]=DB.progress[k]||{readChapters:[]};p.lastChapterId=reader.chapters[reader.idx].id;p.lastChapterNum=reader.chapters[reader.idx].number;p.lastPage=reader.page;p.lastReadAt=Date.now();saveDB();},700);}
function markRead(ch){const k=reader.key;if(!DB.progress[k])DB.progress[k]={readChapters:[]};const p=DB.progress[k];p.readChapters=p.readChapters||[];if(!p.readChapters.includes(ch.id))p.readChapters.push(ch.id);p.lastChapterId=ch.id;p.lastChapterNum=ch.number;p.lastPage=reader.page;p.lastReadAt=Date.now();if(DB.follows[k]){DB.follows[k].lastChapterId=ch.id;DB.follows[k].unread=0;}saveDB();}
function recordHistory(ch){const k=reader.key;DB.history=DB.history.filter(h=>key(h.source,h.id)!==k);DB.history.unshift({source:reader.source,id:reader.key.split("||").slice(1).join("||"),title:reader.title,cover:reader.cover,chapterNum:ch.number});DB.history=DB.history.slice(0,20);saveDB();}
function updateDlBtn(){const b=$("#rDl");if(reader.offline){b.textContent="✓";b.title="Capitolo scaricato";}else{b.textContent="⬇";b.title="Scarica questo capitolo";}}

$("#reader").addEventListener("scroll",()=>{if($("#reader").style.display!=="block"||reader.paged)return;const imgs=document.querySelectorAll("#rPages img");const mid=$("#reader").scrollTop+innerHeight/2;for(let i=0;i<imgs.length;i++){if(imgs[i].offsetTop<=mid&&imgs[i].offsetTop+imgs[i].offsetHeight>=mid){reader.page=i;break;}}updatePgi();saveProgress();});

// ---------- settings + auto-check ----------
function saveSettings(){fetch("/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(DB)});}
async function autoCheck(notify){
  let newCount=0;
  // UNA sola richiesta: il motore controlla tutti i manga in parallelo lato server
  // (niente più 1 richiesta per manga, che il browser strozzava a 6 per volta).
  const items=Object.keys(DB.follows).map(k=>({key:k,source:DB.follows[k].source,id:DB.follows[k].id}));
  let res={};
  try{
    const r=await fetch("/check",{method:"POST",headers:{"Content-Type":"application/json"},
                                  body:JSON.stringify({items})});
    res=(await r.json()).results||{};
  }catch(e){}
  for(const k in res){
    const num=res[k];
    if(num===null||num===undefined||num==="")continue;  // errore o vuoto: lascia com'è
    const f=DB.follows[k]; if(!f)continue;
    f.latestNum=String(num);
    const lr=parseFloat((DB.progress[k]&&DB.progress[k].lastChapterNum)||"")||0;
    const lt=parseFloat(num)||0;
    const unread=(f.category==="Dropped")?0:((lr>0)?Math.max(0,Math.round(lt-lr)):0);
    f.unread=unread; if(unread>0)newCount++;
  }
  saveDB();
  const tot=Object.values(DB.follows).reduce((a,f)=>a+(effUnread(f)>0?1:0),0);
  setBadge(tot);
  if(document.querySelector(".tab.active")&&document.querySelector(".tab.active").dataset.tab==="library")renderLibrary();
  if(notify&&newCount&&SET.notify&&window.Notification&&Notification.permission==="granted"){
    new Notification("MakReader",{body:`${newCount} manga con nuovi capitoli`});
  }
  return tot;
}
async function checkUpdatesManual(){
  const ub=$("#updBtn");if(ub){ub.disabled=true;ub.textContent="🔄 Controllo…";}
  await autoCheck(false);
  renderLibrary();
  toast("Aggiornamenti controllati");
}
let genreScanning=false;
async function scanGenres(){
  if(genreScanning){toast("Scansione generi già in corso…");return;}
  // tutti i manga non ancora scansionati (per ID se presente, altrimenti per titolo)
  const todo=Object.keys(DB.follows).filter(k=>DB.follows[k].genres===undefined);
  if(!todo.length){toast("Generi già scaricati per tutta la libreria ✓");return;}
  genreScanning=true;
  const gm=$("#genreScanMenu");const orig=gm?gm.textContent:"";
  let done=0;const BATCH=20;
  try{
    for(let i=0;i<todo.length;i+=BATCH){
      if(gm)gm.textContent="Generi… "+done+"/"+todo.length;
      const chunk=todo.slice(i,i+BATCH).map(k=>({key:k,malId:DB.follows[k].malId||"",title:DB.follows[k].title||""}));
      try{
        const r=await fetch("/mal/scan",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({items:chunk})});
        const res=(await r.json()).results||{};
        for(const it of chunk){
          const f=DB.follows[it.key];if(!f)continue;
          const got=res[it.key];
          if(got){if(got.malId&&!f.malId)f.malId=got.malId;f.genres=got.genres||[];}
          else f.genres=[];  // nessun risultato: segnato come scansionato (non riprovato)
        }
        await saveDB();
      }catch(e){/* blocco fallito: non segno, verrà ritentato a una nuova scansione */}
      done+=chunk.length;
    }
  }finally{genreScanning=false;if(gm)gm.textContent=orig;}
  toast("Generi da MAL scaricati ✓");
  renderLibrary();
}
let autoTimer;
function scheduleAuto(){if(autoTimer)clearInterval(autoTimer);const h=SET.autoHours||6;if(h>0)autoTimer=setInterval(()=>autoCheck(true),h*3600*1000);}

// ---------- import MyAnimeList ----------
let importCancel=false;
$("#malFile").addEventListener("change",async e=>{
  const file=e.target.files[0];e.target.value="";if(!file)return;
  toast("Leggo il file…");
  let entries;
  try{
    const buf=await file.arrayBuffer();
    const r=await fetch("/import/mal",{method:"POST",headers:{"Content-Type":"application/octet-stream"},body:buf});
    const d=await r.json();if(d.error)throw new Error(d.error);entries=d.entries;
  }catch(err){toast("Import fallito: "+err.message);return;}
  if(!entries.length){toast("Nessun manga trovato nel file.");return;}
  openImportModal(entries);
});
$("#backupFile").addEventListener("change",async e=>{
  const f=e.target.files[0];e.target.value="";if(!f)return;
  if(!confirm("Ripristinare la libreria da questo file? Sostituirà i dati attuali."))return;
  try{const d=JSON.parse(await f.text());if(!d||!d.follows)throw new Error("file non valido");
    DB=Object.assign(DB,d);await saveDB();libSelect=false;selSet.clear();renderLibrary();toast("Libreria ripristinata");
  }catch(err){toast("Ripristino fallito: "+err.message);}
});
function openImportModal(entries){
  const counts={};entries.forEach(x=>{const s=x.status||"Senza stato";counts[s]=(counts[s]||0)+1;});
  const order=["Reading","Plan to Read","Completed","On-Hold","Dropped"];
  const statuses=Object.keys(counts).sort((a,b)=>(order.indexOf(a)+1||99)-(order.indexOf(b)+1||99));
  const en=enabledSources();
  $("#importBox").innerHTML=`
    <h2>Importa da MyAnimeList</h2>
    <p class="sub">${entries.length} manga nel file. Scegli quali stati importare e da quale sorgente cercarli.</p>
    <div class="fld">Stati da importare</div>
    ${statuses.map(s=>`<label class="ck"><input type="checkbox" data-st="${esc(s)}" ${s==="Reading"||s==="Plan to Read"?"checked":""}><span>${esc(s)}</span><span class="ct">${counts[s]}</span></label>`).join("")}
    <div class="fld">Cerca i titoli su</div>
    <select id="impSrc">${en.map(id=>`<option value="${id}" ${id==="weebcentral"?"selected":""}>${esc(metaOf(id).name)}</option>`).join("")}</select>
    <p class="sub" style="margin-top:10px">Per ogni titolo prendo la prima corrispondenza. I non trovati te li elenco alla fine.</p>
    <div id="impArea"></div>
    <div class="row"><button class="btn sec" id="impClose">Annulla</button><button class="btn" id="impGo">Importa</button></div>`;
  $("#importModal").classList.remove("hidden");
  $("#impClose").onclick=()=>{importCancel=true;$("#importModal").classList.add("hidden");};
  $("#impGo").onclick=()=>runImport(entries);
}
let impProposals=[],impSrc=null;
async function runImport(entries){
  const sel=new Set([...document.querySelectorAll("[data-st]:checked")].map(c=>c.dataset.st));
  impSrc=$("#impSrc").value;
  const list=entries.filter(x=>sel.has(x.status||"Senza stato"));
  if(!list.length){toast("Seleziona almeno uno stato.");return;}
  importCancel=false;
  $("#impGo").disabled=true;$("#impClose").textContent="Chiudi";
  const area=$("#impArea");
  impProposals=[];const notfound=[];
  area.innerHTML=`<div class="impbar"><i id="impFill"></i></div><div class="impprog" id="impTxt"></div>`;
  for(let i=0;i<list.length;i++){
    if(importCancel)break;
    const it=list[i];
    $("#impFill").style.width=Math.round((i/list.length)*100)+"%";
    $("#impTxt").textContent=`Cerco (${i+1}/${list.length}): ${it.title}`;
    try{
      const d=await jget(`/search?source=${encodeURIComponent(impSrc)}&q=${encodeURIComponent(it.title)}`);
      const hit=d.results&&d.results[0];
      if(hit)impProposals.push({orig:it.title,status:it.status,read:it.read,malId:it.malId,hit});else notfound.push(it.title);
    }catch(e){notfound.push(it.title+" (errore)");}
    await new Promise(r=>setTimeout(r,200));
  }
  $("#impFill").style.width="100%";
  reviewImport(notfound);
}
function reviewImport(notfound){
  const box=$("#importBox");
  box.innerHTML=`<h2>Rivedi i risultati</h2>
    <p class="sub">${impProposals.length} corrispondenze trovate su ${esc(metaOf(impSrc).name)}. Deseleziona quelle sbagliate, poi conferma.</p>
    <div style="display:flex;gap:8px;margin-bottom:8px"><button class="btn sec" id="impAll" style="padding:6px 12px">Tutti</button><button class="btn sec" id="impNone" style="padding:6px 12px">Nessuno</button></div>
    <div style="max-height:46vh;overflow:auto">${impProposals.map((p,i)=>{
      const k=key(impSrc,p.hit.id),dup=!!DB.follows[k];
      return `<label class="ck"><input type="checkbox" data-pi="${i}" ${dup?'':'checked'} ${dup?'disabled':''}>
        ${p.hit.cover?`<img src="${img(p.hit.cover,srcRef(impSrc))}" style="width:30px;height:42px;object-fit:cover;border-radius:4px" onerror="this.style.visibility='hidden'">`:''}
        <span style="flex:1"><b>${esc(p.hit.title||p.orig)}</b><br><span style="color:var(--muted);font-size:12px">da: ${esc(p.orig)}${dup?' · già in libreria':''}</span></span></label>`;
    }).join("")||'<div class="empty">Nessuna corrispondenza.</div>'}</div>
    ${notfound.length?`<div class="fld">Non trovati (${notfound.length}) — cercali a mano:</div><div style="font-size:12px;color:var(--muted);max-height:120px;overflow:auto">${notfound.map(esc).join("<br>")}</div>`:''}
    <div class="row"><button class="btn sec" id="impClose2">Annulla</button><button class="btn" id="impConfirm">Aggiungi selezionati</button></div>`;
  $("#impAll").onclick=()=>box.querySelectorAll("[data-pi]:not(:disabled)").forEach(c=>c.checked=true);
  $("#impNone").onclick=()=>box.querySelectorAll("[data-pi]").forEach(c=>c.checked=false);
  $("#impClose2").onclick=()=>$("#importModal").classList.add("hidden");
  $("#impConfirm").onclick=async()=>{
    let added=0;
    box.querySelectorAll("[data-pi]:checked").forEach(c=>{const p=impProposals[+c.dataset.pi];const k=key(impSrc,p.hit.id);if(!DB.follows[k]){DB.follows[k]={source:impSrc,id:p.hit.id,title:p.hit.title||p.orig,cover:p.hit.cover||"",category:p.status||"",malRead:parseInt(p.read||"0")||0,malId:p.malId||"",lastChapterId:null};added++;}});
    await saveDB();$("#importModal").classList.add("hidden");toast(`${added} manga aggiunti alla libreria`);renderLibrary();
  };
}

// ---------- chiusura app ----------
async function quitApp(){
  if(!confirm("Chiudere MakReader? Il programma si spegnerà; potrai riaprirlo dall'icona."))return;
  try{await fetch("/quit",{method:"POST"});}catch(e){}
  document.body.innerHTML='<div style="padding:70px 20px;text-align:center;color:#9aa3b2;font-family:-apple-system,sans-serif;font-size:15px">MakReader è stato chiuso.<br>Puoi chiudere questa scheda del browser.</div>';
}
$("#quitTop").onclick=quitApp;

// ---------- init ----------
(async function(){
  for(let attempt=0;attempt<6 && !dataLoaded;attempt++){
    try{DB=await jget("/data");dataLoaded=true;}catch(e){await new Promise(r=>setTimeout(r,400));}
  }
  if(!dataLoaded){const lv=document.getElementById("view-library");if(lv)lv.innerHTML='<div class="errbox" style="margin:20px">Non riesco a leggere la libreria dal server. Ricarica la pagina (Cmd/Ctrl+R). Per sicurezza non salvo nulla finché non ci riesco.</div>';}
  try{const s=await jget("/sources");META=s.meta;if(s.config&&s.config.order){DB.sources=s.config;}}catch(e){}
  if(!DB.sources||!DB.sources.order){DB.sources={order:META.map(m=>m.id),enabled:Object.fromEntries(META.map(m=>[m.id,true]))};}
  if(DB.settings)SET=Object.assign(SET,DB.settings);
  if(!DB.suggestions)DB.suggestions=[];
  await loadDownloads();
  fillSourceSelect();renderLibrary();setSugBadge();
  // controllo non letti in background (non blocca l'avvio)
  setTimeout(()=>{if(Object.keys(DB.follows).length)autoCheck(false);},1500);
  scheduleAuto();
})();
</script>
