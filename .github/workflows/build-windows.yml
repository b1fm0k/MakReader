name: Crea programma Windows
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - run: pyinstaller --noconfirm --name MakReader --onedir --add-data "index.html;." --add-data "sources.py;." --add-data "downloads.py;." --add-data "version.json;." --hidden-import ssl --hidden-import re --hidden-import html --hidden-import queue --hidden-import hashlib --hidden-import urllib.request --hidden-import urllib.error mangareader.py
      - run: Compress-Archive -Path dist/MakReader/* -DestinationPath MakReader-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: MakReader-Windows
          path: MakReader-Windows.zip
