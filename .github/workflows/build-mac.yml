name: Crea programma Mac
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller pillow
      - run: pyinstaller --noconfirm --name MakReader --windowed --icon makreader.png --add-data "index.html:." --add-data "sources.py:." --add-data "downloads.py:." --add-data "version.json:." --add-data "makreader.png:." --hidden-import ssl --hidden-import re --hidden-import html --hidden-import queue --hidden-import hashlib --hidden-import urllib.request --hidden-import urllib.error mangareader.py
      - run: ditto -c -k --keepParent dist/MakReader.app MakReader-Mac.zip
      - uses: actions/upload-artifact@v4
        with:
          name: MakReader-Mac
          path: MakReader-Mac.zip
      - name: Allega alla Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: MakReader-Mac.zip
